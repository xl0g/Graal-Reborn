<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Multiplayer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0c0c16;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #304080;
            box-shadow: 0 0 32px #1040a040;
            background: #0c0c16;
            overflow: hidden;
        }

        /* Ebiten's canvas is moved here via JS */
        #game-container canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #50b4ff;
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: monospace;
            pointer-events: none;
        }

        #error {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            color: #ff6060;
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">Chargement du jeu...</div>
    </div>
    <div id="error"></div>

    <script src="/wasm_exec.js"></script>
    <script>
        const go = new Go();
        const container = document.getElementById('game-container');
        const loading   = document.getElementById('loading');
        const errorEl   = document.getElementById('error');

        WebAssembly.instantiateStreaming(fetch('/game.wasm'), go.importObject)
            .then(result => {
                go.run(result.instance);

                // Ebiten appends canvas#ebitengame to <body>.
                // Move it into our container so layout and click coords are correct.
                (function mountCanvas() {
                    const canvas = document.getElementById('ebitengame');
                    if (canvas) {
                        container.appendChild(canvas);
                        loading.style.display = 'none';
                    } else {
                        requestAnimationFrame(mountCanvas);
                    }
                })();
            })
            .catch(err => {
                loading.textContent = 'Erreur de chargement';
                loading.style.color = '#ff6060';
                errorEl.style.display = 'block';
                errorEl.textContent = String(err);
                console.error(err);
            });
    </script>
</body>
</html>
